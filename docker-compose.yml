services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: crea
      POSTGRES_PASSWORD: crea
      POSTGRES_DB: crea_dashboard
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crea -d crea_dashboard"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s

volumes:
  postgres_data:
