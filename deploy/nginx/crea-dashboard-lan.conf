# CreaDashboard — LAN-only dashboard (substituted by scripts/deploy-remote.sh)
# Listens only on the local network interface, not on 0.0.0.0.

server {
    listen __LAN_BIND_IP__:__HTTP_PORT__;
    server_name _;

    root __APP_DIR__/frontend/dist;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:__API_PORT__;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
